experiment_id: e1-token-length-linear-ablation-qwen-7b-vllm
description: "E1 linear-penalty ABLATION (negative control) with vLLM fast inference. Naive -alpha*n_tokens penalty; under advantage_weighted alpha/schedule cancel in per-group z-scoring and only the sign survives -> unconditional short-preference -> length collapse. Kept to document the failure the cosine default fixes."
seed: 42

model:
  slug: qwen-7b
  lora_r: 16
  load_in_4bit: true
  max_seq_length: 2048
  use_vllm: true
  gpu_memory_utilization: 0.6
  enforce_eager: true

training:
  domain: math
  dataset: openai/gsm8k
  split: train
  n_rollouts: 8
  max_steps: 500
  learning_rate: 5e-6
  kl_beta: 0.001

rewards:
  compose_method: advantage_weighted
  format_exact:
    enabled: true
    weight: 1.0
  format_approx:
    enabled: true
    weight: 0.5
  accuracy:
    enabled: true
    weight: 1.0
  numeric:
    enabled: true
    weight: 1.0
  token_length:
    enabled: true
    weight: 1.0
    # Linear ABLATION (negative control). shape: linear is explicit now that the
    # registry default is cosine. Under advantage_weighted, alpha and schedule are
    # inert (z-scoring cancels global scalars) — this config exists to demonstrate
    # the resulting length collapse, not to tune it.
    shape: linear
    alpha: 0.001
    schedule: cosine
  token_entropy:
    enabled: false
  effort_proxy:
    enabled: false

eval:
  temperature: 0.0
  do_sample: false
  # Fixed over/under-thinking thresholds from the e0 baseline so thinking
  # rates are comparable across the sweep (eval.metrics.load_reference_thresholds).
  reference_run: runs/e0-baseline-math-qwen-7b-vllm
  id_split: openai/gsm8k
  id_split_hf_split: test
  ood_probes:
    near: EleutherAI/hendrycks_math
    far: MMLU
    capability_floor: simple
