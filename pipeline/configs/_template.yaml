# GRPO Pipeline - Agentic Config Template
# Copy + modify for each experiment. Most fields have defaults; the ones shown
# are the common levers. The pipeline is agentic-only: the model is driven
# through its native tool-calling template and rewarded by a live OpenEnv
# environment, not graded against a dataset answer column.

experiment_id: eX-my-experiment-qwen3-1_7b
description: "agentic GRPO on reasoning_gym via OpenEnv, Qwen3-1.7B, vLLM colocate"
seed: 42

model:
  slug: qwen3-1.7b              # key into training/registry.py
  lora_r: 16
  max_seq_length: 2048
  # bf16 + vLLM colocate are the registry/runner defaults.

training:
  mode: agentic                # only `agentic` is supported
  env: reasoning_gym           # only `reasoning_gym` is implemented
  env_config:
    dataset: chain_sum         # reasoning-gym task family
    size: 500                  # number of distinct training prompts (one seed each)
  env_server:
    # OpenEnv env launched locally (no Docker) by the runner as a subprocess.
    repo_path: /workspace/OpenEnv/envs   # clone of meta-pytorch/OpenEnv
    port: 8077
  n_rollouts: 8                # GRPO group size
  max_steps: 300
  learning_rate: 5e-6
  kl_beta: 0.001

rewards:
  compose_method: advantage_weighted   # advantage_weighted | naive_sum

  # Task-success signal from the environment. The live signal in agentic mode.
  env_reward:
    enabled: true
    weight: 1.0

  # Cosine length shape (Wu/Yeo): correct -> prefer shorter, wrong -> prefer
  # longer. Correctness comes from env.reward > 0. Survives advantage_weighted
  # per-group z-scoring because it is non-linear in length and correctness-gated.
  token_length:
    enabled: false
    weight: 1.0
    max_len: 256
    r_correct_short: 1.0
    r_correct_long: 0.5
    r_wrong_short: -1.0
    r_wrong_long: -0.5

  # Token-entropy shaping (mask the reward to the top-fraction of tokens by
  # entropy). reward_scale is inert under advantage_weighted (z-scoring cancels
  # global positive scalars); use `weight` or compose_method: naive_sum.
  token_entropy:
    enabled: false
    weight: 1.0
    reward_scale: 0.1
    fork_mask_top_frac: 0.0    # 0.0 = all tokens; 0.2 = top-20% by entropy

eval:
  temperature: 0.0
  do_sample: false
  # max_new_tokens defaults to the training completion budget (max_seq -
  # max_prompt_length); set explicitly only to override.
  agentic:
    n_episodes: 100            # held-out episodes (seeds disjoint from training)
