experiment_id: e1-token-length-qwen-7b
description: "E1 token-length (cosine): accuracy + format + correctness-coupled cosine length reward (advantage-weighted, Qwen2-7B). Cosine length survives per-group z-scoring."
seed: 42

model:
  slug: qwen-7b
  lora_r: 16
  load_in_4bit: true
  max_seq_length: 2048

training:
  domain: math
  dataset: openai/gsm8k
  split: train
  n_rollouts: 8
  max_steps: 500
  learning_rate: 5e-6
  kl_beta: 0.001

rewards:
  compose_method: advantage_weighted
  format_exact:
    enabled: true
    weight: 1.0
  format_approx:
    enabled: true
    weight: 0.5
  accuracy:
    enabled: true
    weight: 1.0
  numeric:
    enabled: true
    weight: 1.0
  token_length:
    enabled: true
    weight: 0.5
    max_len: 256
    r_correct_short: 1.0
    r_correct_long: 0.5
    r_wrong_short: -1.0
    r_wrong_long: -0.5

eval:
  temperature: 0.0
  do_sample: false
  reference_run: runs/e0-baseline-math-qwen-7b
  id_split: openai/gsm8k
  id_split_hf_split: test
  ood_probes:
    near: EleutherAI/hendrycks_math
    far: MMLU
    capability_floor: simple
  capability_floor_dataset: openai/gsm8k
  capability_floor_hf_split: test
  capability_floor_limit: 50
  capability_floor_take: tail
