experiment_id: probe-polynomial_equations
description: "Difficulty probe: polynomial_equations (defaults: 2-4 terms, degree 1-3). Multi-step algebra - expected sub-saturation with long reasoning chains (length headroom for the cosine reward). Env-only, 5 train steps (~base) + 50-episode eval."
seed: 42

model:
  slug: qwen3-1.7b
  lora_r: 16
  max_seq_length: 2048

training:
  mode: agentic
  env: reasoning_gym
  env_config:
    dataset: polynomial_equations
    size: 500
  env_server:
    repo_path: /workspace/OpenEnv/envs
    port: 8077
  n_rollouts: 8
  max_steps: 5
  learning_rate: 5e-6
  kl_beta: 0.001

rewards:
  compose_method: advantage_weighted
  env_reward:
    enabled: true
    weight: 1.0

eval:
  temperature: 0.0
  do_sample: false
  agentic:
    n_episodes: 50
