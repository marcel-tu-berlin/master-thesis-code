experiment_id: probe-chain_sum-hard
description: "Difficulty probe: chain_sum cranked (8-15 terms, 4-6 digits) vs the saturated default. Env-only, 5 train steps (~base model) + 50-episode eval to measure Qwen3-1.7B success + completion length. Finds a non-saturated Goldilocks task for the cosine-length ablation (chain_sum default = ~93%, no headroom)."
seed: 42

model:
  slug: qwen3-1.7b
  lora_r: 16
  max_seq_length: 2048

training:
  mode: agentic
  env: reasoning_gym
  env_config:
    dataset: chain_sum
    dataset_config:
      min_terms: 8
      max_terms: 15
      min_digits: 4
      max_digits: 6
    size: 500
  env_server:
    repo_path: /workspace/OpenEnv/envs
    port: 8077
  n_rollouts: 8
  max_steps: 5
  learning_rate: 5e-6
  kl_beta: 0.001

rewards:
  compose_method: advantage_weighted
  env_reward:
    enabled: true
    weight: 1.0

eval:
  temperature: 0.0
  do_sample: false
  agentic:
    n_episodes: 50
