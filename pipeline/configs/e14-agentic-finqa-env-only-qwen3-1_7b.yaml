experiment_id: e14-agentic-finqa-env-only-qwen3-1_7b
description: "E14: agentic GRPO on FinQA financial QA via OpenEnv (MCP, multi-turn), env reward only (cosine length OFF). First real-task env beyond reasoning_gym: numeric QA over SEC-filing tables, binary env reward (1 correct / 0 wrong) after submit_answer. Establishes the env-only baseline; the cosine-length ablation arm is a later config."
seed: 42

model:
  slug: qwen3-1.7b
  lora_r: 16
  # Multi-turn MCP episodes accumulate several tool calls plus verbose table/SQL
  # results injected between turns, so the rollout stream is longer than
  # single-step reasoning_gym. 4096 gives the tool-use loop room; smoke-calibrate
  # and raise FINQA_MAX_STEPS / seq together if streams truncate before submit.
  max_seq_length: 4096

training:
  mode: agentic
  env: finqa
  env_config:
    # FinQA dataset downloaded into the OpenEnv clone (snorkelai/finqa-data).
    data_path: /workspace/OpenEnv/envs/finqa_env/data
    max_steps: 50          # env-side tool-call cap before force-end with reward 0
  env_server:
    repo_path: /workspace/OpenEnv/envs   # clone of meta-pytorch/OpenEnv
    # finqa_env's server.app main() binds 8000 with no --port argparse (like
    # textarena, unlike reasoning_gym), so target 8000 for the readiness probe.
    port: 8000
  max_prompt_length: 1024
  n_rollouts: 8
  max_steps: 300
  learning_rate: 5e-6
  kl_beta: 0.001

rewards:
  compose_method: advantage_weighted
  env_reward:
    enabled: true
    weight: 1.0
  token_length:
    # Env-only baseline: cosine length reward OFF. A later config enables it to
    # measure the cosine reward's effect on this real-task env.
    enabled: false

eval:
  temperature: 0.0
  do_sample: false
  agentic:
    n_episodes: 100
