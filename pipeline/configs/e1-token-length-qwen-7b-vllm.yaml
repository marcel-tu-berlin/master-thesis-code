experiment_id: e1-token-length-qwen-7b-vllm
description: "E1 single-signal: accuracy + correctness-coupled COSINE length reward with vLLM fast inference (Wu/Yeo-2025, Qwen2-7B). Fixes the linear-penalty collapse — alpha/schedule are inert under advantage_weighted z-scoring."
seed: 42

model:
  slug: qwen-7b
  lora_r: 16
  load_in_4bit: true
  max_seq_length: 2048
  use_vllm: true
  gpu_memory_utilization: 0.6
  enforce_eager: true

training:
  domain: math
  dataset: openai/gsm8k
  split: train
  n_rollouts: 8
  max_steps: 500
  learning_rate: 5e-6
  kl_beta: 0.001

rewards:
  compose_method: advantage_weighted
  format_exact:
    enabled: true
    weight: 1.0
  format_approx:
    enabled: true
    weight: 0.5
  accuracy:
    enabled: true
    weight: 1.0
  numeric:
    enabled: true
    weight: 1.0
  token_length:
    enabled: true
    weight: 1.0
    # Cosine shape: correct -> prefer shorter, wrong -> prefer longer. Survives
    # the per-group z-scoring that nullifies the linear penalty's alpha. max_len
    # is the length normalizer (progress = min(n_tokens/max_len, 1)); tune to the
    # dataset's completion-length range (GSM8K trained completions ~150-250).
    shape: cosine
    max_len: 256
    r_correct_short: 1.0
    r_correct_long: 0.5
    r_wrong_short: -1.0
    r_wrong_long: -0.5
  token_entropy:
    enabled: false
  effort_proxy:
    enabled: false

eval:
  temperature: 0.0
  do_sample: false
  # Fixed over/under-thinking thresholds from the e0 baseline so thinking
  # rates are comparable across the sweep (eval.metrics.load_reference_thresholds).
  reference_run: runs/e0-baseline-math-qwen-7b-vllm
  id_split: openai/gsm8k
  id_split_hf_split: test
  ood_probes:
    near: EleutherAI/hendrycks_math
    far: MMLU
    capability_floor: simple
  # T2.6: graded 50-problem capability floor from the GSM8K test tail (disjoint
  # from the id_split head[:200]) so a collapse/over-compression regression
  # drops the floor below 1.0 instead of saturating on the 6 toy prompts.
  capability_floor_dataset: openai/gsm8k
  capability_floor_hf_split: test
  capability_floor_limit: 50
  capability_floor_take: tail
