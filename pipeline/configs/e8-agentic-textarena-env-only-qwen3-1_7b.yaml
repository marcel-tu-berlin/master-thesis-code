experiment_id: e8-agentic-textarena-env-only-qwen3-1_7b
description: "E8: ablation baseline - TextArena Wordle, env reward only (cosine length OFF), multi-turn, Qwen3-1.7B. Pairs with e7 to isolate the cosine length reward's effect on total model tokens."
seed: 42

model:
  slug: qwen3-1.7b
  lora_r: 16
  max_seq_length: 4096

training:
  mode: agentic
  env: textarena
  env_config:
    env_id: Wordle-v0
    num_players: 1
    max_turns: 6
    size: 500
  env_server:
    repo_path: /workspace/OpenEnv/envs
    # textarena_env's server.app ignores --port and always binds 8000 (no argparse
    # in its __main__, unlike reasoning_gym). Target 8000 to match.
    port: 8000
  n_rollouts: 8
  max_steps: 300
  learning_rate: 5e-6
  kl_beta: 0.001

rewards:
  compose_method: advantage_weighted
  env_reward:
    enabled: true
    weight: 1.0
  token_length:
    # Ablation arm: cosine length reward OFF. e7 enables it (env+cosine); this run
    # is env-only, so any per-episode model-token difference between the two is the
    # cosine reward's causal effect, not a task or capacity artifact.
    enabled: false

eval:
  temperature: 0.0
  do_sample: false
  agentic:
    n_episodes: 100
