experiment_id: e3-ablation-naive-sum-qwen-7b
description: "E3 ablation (cosine): identical to e2-multi-signal-qwen-7b but compose_method=naive_sum. Isolates the DIET advantage-weighting effect with the length shape held at cosine."
seed: 42

model:
  slug: qwen-7b
  lora_r: 16
  load_in_4bit: true
  max_seq_length: 2048

training:
  domain: math
  dataset: openai/gsm8k
  split: train
  n_rollouts: 8
  max_steps: 500
  learning_rate: 5e-6
  kl_beta: 0.001

rewards:
  compose_method: naive_sum
  format_exact:
    enabled: true
    weight: 1.0
  format_approx:
    enabled: true
    weight: 0.5
  accuracy:
    enabled: true
    weight: 1.0
  numeric:
    enabled: true
    weight: 1.0
  token_length:
    enabled: true
    weight: 0.5
    # Cosine shape: correct -> prefer shorter, wrong -> prefer longer. Matched to
    # e2-multi-signal-qwen-7b so the only difference vs E2 is the composer
    # (naive_sum). Under naive_sum the cosine endpoints contribute directly.
    shape: cosine
    max_len: 256
    r_correct_short: 1.0
    r_correct_long: 0.5
    r_wrong_short: -1.0
    r_wrong_long: -0.5
  token_entropy:
    enabled: true
    weight: 0.5
    reward_scale: 0.1
    fork_mask_top_frac: 0.2
  effort_proxy:
    enabled: false

eval:
  temperature: 0.0
  do_sample: false
  # Fixed over/under-thinking thresholds from the e0 baseline so thinking
  # rates are comparable across the sweep (eval.metrics.load_reference_thresholds).
  reference_run: runs/e0-baseline-math-qwen-7b
  id_split: openai/gsm8k
  id_split_hf_split: test
  ood_probes:
    near: EleutherAI/hendrycks_math
    far: MMLU
    capability_floor: simple
