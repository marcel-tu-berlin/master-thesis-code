experiment_id: e3-ablation-naive-sum
description: "E3 ablation: same as e2-multi-signal but compose_method=naive_sum. Tests DIET advantage-weighting hypothesis."
seed: 42

model:
  slug: qwen-1.5b
  lora_r: 16
  load_in_4bit: true
  max_seq_length: 2048

training:
  domain: math
  dataset: openai/gsm8k
  split: train
  n_rollouts: 8
  max_steps: 500
  learning_rate: 5e-6
  kl_beta: 0.001

rewards:
  compose_method: naive_sum
  format_exact:
    enabled: true
    weight: 1.0
  format_approx:
    enabled: true
    weight: 0.5
  accuracy:
    enabled: true
    weight: 1.0
  numeric:
    enabled: true
    weight: 1.0
  token_length:
    enabled: true
    weight: 0.5
    alpha: 0.001
    schedule: cosine
  token_entropy:
    enabled: true
    weight: 0.5
    reward_scale: 0.1
    fork_mask_top_pct: 0.2
  effort_proxy:
    enabled: false

eval:
  temperature: 0.0
  do_sample: false
  id_split: openai/gsm8k
  id_split_hf_split: test
  ood_probes:
    near: EleutherAI/hendrycks_math
    far: MMLU
    capability_floor: simple
