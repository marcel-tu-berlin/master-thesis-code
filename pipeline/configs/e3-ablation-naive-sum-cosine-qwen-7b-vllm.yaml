experiment_id: e3-ablation-naive-sum-cosine-qwen-7b-vllm
description: "E3 ablation (cosine): identical to e2-multi-signal-cosine-qwen-7b-vllm but compose_method=naive_sum. Isolates the DIET advantage-weighting effect at 7B with vLLM. Under naive_sum the component scales are live (no z-scoring), so the cosine endpoints and reward_scale contribute directly."
seed: 42

model:
  slug: qwen-7b
  lora_r: 16
  load_in_4bit: true
  max_seq_length: 2048
  use_vllm: true
  gpu_memory_utilization: 0.6
  enforce_eager: true

training:
  domain: math
  dataset: openai/gsm8k
  split: train
  n_rollouts: 8
  max_steps: 500
  learning_rate: 5e-6
  kl_beta: 0.001

rewards:
  compose_method: naive_sum
  format_exact:
    enabled: true
    weight: 1.0
  format_approx:
    enabled: true
    weight: 0.5
  accuracy:
    enabled: true
    weight: 1.0
  numeric:
    enabled: true
    weight: 1.0
  token_length:
    enabled: true
    weight: 0.5
    # Cosine shape: correct -> prefer shorter, wrong -> prefer longer. Matched to
    # e2-multi-signal-cosine so the only difference vs E2 is the composer.
    shape: cosine
    max_len: 256
    r_correct_short: 1.0
    r_correct_long: 0.5
    r_wrong_short: -1.0
    r_wrong_long: -0.5
  token_entropy:
    enabled: true
    weight: 0.5
    reward_scale: 0.1
    fork_mask_top_frac: 0.2
  effort_proxy:
    enabled: false

eval:
  temperature: 0.0
  do_sample: false
  # Fixed over/under-thinking thresholds from the e0 baseline so thinking
  # rates are comparable across the sweep (eval.metrics.load_reference_thresholds).
  reference_run: runs/e0-baseline-math-qwen-7b-vllm
  id_split: openai/gsm8k
  id_split_hf_split: test
  ood_probes:
    near: EleutherAI/hendrycks_math
    far: MMLU
    capability_floor: simple
  # T2.6: graded 50-problem capability floor from the GSM8K test tail (disjoint
  # from the id_split head[:200]) so a collapse/over-compression regression
  # drops the floor below 1.0 instead of saturating on the 6 toy prompts.
  capability_floor_dataset: openai/gsm8k
  capability_floor_hf_split: test
  capability_floor_limit: 50
  capability_floor_take: tail
